<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ice Cream Tower</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;

    background:
    linear-gradient(
        to bottom,
        #ffe5ec 0%,
        #ffe5ec 35%,
        #fff4d6 35%,
        #fff4d6 100%
    );
}

/* 招牌條紋 */

#awning{
    position:absolute;
    top:0;
    width:100%;
    height:120px;

    background:
    repeating-linear-gradient(
        45deg,
        #ffb3c6,
        #ffb3c6 20px,
        white 20px,
        white 40px
    );
}

#title{
    position:absolute;
    top:25px;
    width:100%;
    text-align:center;
    font-size:42px;
    font-weight:bold;
    z-index:5;
}

#ui{
    position:absolute;
    top:140px;
    left:20px;
    font-size:24px;
    font-weight:bold;
    z-index:5;
}

#ball{
    position:absolute;
    width:70px;
    height:70px;
    z-index:4;
}

.scoopBall{
    width:70px;
    height:70px;
    border-radius:50%;
    position:relative;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.topping{
    position:absolute;
    top:5px;
    left:15px;
    width:40px;
    height:15px;
    border-radius:20px;
    background:#7b3f00;
}

.shine{
    position:absolute;
    top:10px;
    left:15px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:rgba(255,255,255,.5);
}

.gold{
    box-shadow:
    0 0 10px gold,
    0 0 20px gold,
    0 0 30px gold;
}

#cone{
    position:absolute;
    bottom:20px;
    width:90px;
    height:120px;
}

#cone::before{
    content:"";
    position:absolute;

    border-left:45px solid transparent;
    border-right:45px solid transparent;
    border-top:120px solid #c68642;
}

.stack{
    position:absolute;
    width:65px;
    height:65px;
    border-radius:50%;
    box-shadow:0 4px 8px rgba(0,0,0,.2);
}

#endScreen{
    display:none;

    position:absolute;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    background:white;
    padding:30px;

    border-radius:15px;

    text-align:center;

    box-shadow:0 0 20px rgba(0,0,0,.3);

    z-index:20;
}

button{
    margin-top:15px;
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}
    #startScreen{
    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    background:white;

    padding:30px;

    border-radius:15px;

    text-align:center;

    box-shadow:0 0 20px rgba(0,0,0,.3);

    z-index:30;
}

</style>
</head>
<body>

<div id="game">

<div id="startScreen">
    <h1>🍦 Ice Cream Tower</h1>

    <p>左右鍵 / A、D 移動甜筒</p>
    <p>空白鍵或滑鼠放下冰淇淋</p>

    <br>

    <h2>按空白鍵開始遊戲</h2>
</div>

<div id="awning"></div>

<div id="title">🍦 Ice Cream Tower</div>

<div id="ui">
🏆 分數：<span id="score">0</span><br>
🍨 高度：<span id="height">0</span><br>
⏱️ 時間：<span id="time">30</span>
</div>

<div id="ball"></div>

<div id="cone"></div>

<div id="endScreen">
    <h1>🍦 遊戲結束</h1>
    <h2 id="rank"></h2>
    <br>
    <p>🏆 分數：<span id="finalScore"></span></p>
    <p>🍨 高度：<span id="finalHeight"></span></p>

    <button onclick="location.reload()">
        再玩一次
    </button>
</div>

</div>

<script>

let score = 0;
let towerHeight = 0;
let tower = [];
let gameOver = false;
    
let ballX = 100;
let ballY = 150;

let ballDir = 1;
let ballFalling = false;

let coneX = 300;

const ball =
document.getElementById("ball");

const cone =
document.getElementById("cone");

const game =
document.getElementById("game");

let currentGold = false;
let currentColor = "";

const flavors = [

"radial-gradient(circle at 30% 30%,#ffd6e0,#ff8db1)",

"radial-gradient(circle at 30% 30%,#fffef5,#f1dfb5)",

"radial-gradient(circle at 30% 30%,#8b5a3c,#4b2d20)",

"radial-gradient(circle at 30% 30%,#cde9b6,#6d9b4d)",

"radial-gradient(circle at 30% 30%,#ffe29a,#ffb300)"

];

function createBall(){

    currentGold =
    Math.random() < 0.1;

    ball.innerHTML = "";

    let scoop =
    document.createElement("div");

    scoop.className = "scoopBall";

    if(currentGold){

        scoop.classList.add("gold");

        scoop.style.background =
        "linear-gradient(45deg,#ffd700,#fff6a0,#ffcc00)";
    }
    else{

        currentColor =
        flavors[
            Math.floor(
            Math.random()*flavors.length
            )
        ];

        scoop.style.background =
        currentColor;
    }

    let topping =
    document.createElement("div");

    topping.className = "topping";

    let shine =
    document.createElement("div");

    shine.className = "shine";

    scoop.appendChild(topping);
    scoop.appendChild(shine);

    ball.appendChild(scoop);
}

createBall();

function addTower(){

    tower.push({

        color:
        currentGold
        ?
        "linear-gradient(45deg,#ffd700,#fff6a0,#ffcc00)"
        :
        currentColor,

        gold: currentGold,

        offset:
        Math.random()*20 - 10,

        rotate:
        Math.random()*14 - 7

    });

    towerHeight++;

    document.getElementById("height")
    .innerText = towerHeight;
}

function drawTower(){

    document
    .querySelectorAll(".stack")
    .forEach(x=>x.remove());

    for(let i=0;i<tower.length;i++){

        let scoop =
        document.createElement("div");

        scoop.className = "stack";

        scoop.style.background =
        tower[i].color;

        if(tower[i].gold){

            scoop.style.boxShadow =
            "0 0 15px gold";
        }

        scoop.style.left =
        (coneX + 12 + tower[i].offset)
        + "px";

        scoop.style.bottom =
        (115 + i*38)
        + "px";

        scoop.style.transform =
        `rotate(${tower[i].rotate}deg)`;

        game.appendChild(scoop);
    }
}
    else{

        scoop.style.background =
        currentColor;
    }

    let offset =
    Math.random()*20 - 10;

    let rotate =
    Math.random()*14 - 7;

    scoop.style.left =
    (coneX + 12 + offset)
    + "px";

    scoop.style.bottom =
    (115 + towerHeight*38)
    + "px";

    scoop.style.transform =
    "rotate("+rotate+"deg)";

    game.appendChild(scoop);

    towerHeight++;

    document.getElementById("height")
    .innerText = towerHeight;
}

function resetBall(){

    ballX =
    Math.random() *
    (window.innerWidth-70);

    ballY = 150;

    ballFalling = false;

    createBall();
}

function dropBall(){

    if(gameOver) return;

    if(!ballFalling){

        ballFalling = true;
    }
}

document.addEventListener(
"click",
dropBall
);

document.addEventListener(
"keydown",
function(e){

    if(e.code==="Space"){

        dropBall();
    }

    if(e.key==="a" ||
       e.key==="ArrowLeft"){

        coneX -= 25;
    }

    if(e.key==="d" ||
       e.key==="ArrowRight"){

        coneX += 25;
    }

    if(coneX < 0)
    coneX = 0;

    if(coneX >
       window.innerWidth-90)
    coneX =
       window.innerWidth-90;
});

function update(){

    if(gameOver) return;

    if(!ballFalling){

        ballX += ballDir * 5;

        if(ballX <= 0 ||
           ballX >=
           window.innerWidth-70){

            ballDir *= -1;
        }
    }
    else{

        ballY += 8;
    let ballLeft = ballX;
    let ballRight = ballX + 70;

    let coneLeft = coneX;
    let coneRight = coneX + 90;

    if(
        ballY >
        window.innerHeight - 220
        ){

        if(
            ballRight > coneLeft &&
            ballLeft < coneRight
        ){
     
                if(currentGold)
                    score += 5;
                else
                    score += 1;

                document
                .getElementById("score")
                .innerText = score;

                addTower();

                resetBall();
            }
        }

        if(ballY >
           window.innerHeight){

            resetBall();
        }
    }

    ball.style.left =
    ballX + "px";

    ball.style.top =
    ballY + "px";

    cone.style.left =
    coneX + "px";

drawTower();

    requestAnimationFrame(update);
}

update();

let time = 30;

const timer =
setInterval(function(){

    time--;

    document
    .getElementById("time")
    .innerText = time;

    if(time <= 0){

        clearInterval(timer);

        gameOver = true;

        let rank = "";

        if(score < 5)
            rank = "😅 實習店員";
        else if(score < 10)
            rank = "🍦 冰淇淋學徒";
        else if(score < 15)
            rank = "👨‍🍳 冰淇淋師傅";
        else if(score < 20)
            rank = "⭐ 冰淇淋大師";
        else if(score < 25)
            rank = "👑 冰淇淋之王";
        else
            rank = "🌈 傳說級冰淇淋神匠";

        document
        .getElementById("rank")
        .innerText = rank;

        document
        .getElementById("finalScore")
        .innerText = score;

        document
        .getElementById("finalHeight")
        .innerText = towerHeight;

        document
        .getElementById("endScreen")
        .style.display = "block";
    }

},1000);

</script>

</body>
</html>
