<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍦 Ice Cream Tower</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(#87CEEB,#E0F7FF);
    font-family:Arial,sans-serif;
}

#game{
    position:relative;
    width:100vw;
    height:100vh;
}

#ui{
    position:absolute;
    top:15px;
    left:15px;
    font-size:24px;
    font-weight:bold;
    z-index:100;
}

.ball{
    position:absolute;
    width:60px;
    height:60px;
    border-radius:50%;
}

#ball1{
    background:pink;
}

#ball2{
    background:khaki;
}

#cone{
    position:absolute;
    bottom:20px;
    font-size:100px;
    user-select:none;
}

.scoop{
    position:absolute;
    width:55px;
    height:55px;
    border-radius:50%;
    border:2px solid rgba(0,0,0,0.1);
}

#endScreen{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    display:none;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

</style>
</head>

<body>

<div id="game">

<div id="ui">
🏆 分數：<span id="score">0</span><br>
🍨 高度：<span id="height">0</span><br>
⏱️ 時間：<span id="time">30</span>
</div>

<div id="ball1" class="ball"></div>
<div id="ball2" class="ball"></div>

<div id="cone">🍦</div>

<div id="endScreen">
<h1>遊戲結束</h1>

<p>得分：<span id="finalScore"></span></p>
<p>冰淇淋高度：<span id="finalHeight"></span></p>

<button onclick="location.reload()">
重新開始
</button>
</div>

</div>

<script>

let score = 0;
let towerHeight = 0;
let timeLeft = 30;
let gameOver = false;

const cone = document.getElementById("cone");

let coneX = window.innerWidth/2;

const colors = [
"#ffb6c1",
"#fff0a8",
"#c6f5c6",
"#add8e6",
"#ffd59e",
"#d8b4ff",
"#ffffff"
];

let balls = [

{
el:document.getElementById("ball1"),
x:100,
y:80,
speed:4,
dir:1,
falling:false
},

{
el:document.getElementById("ball2"),
x:500,
y:180,
speed:5,
dir:-1,
falling:false
}

];

function updateBall(ball){

if(!ball.falling){

ball.x += ball.speed * ball.dir;

if(ball.x <= 0 ||
ball.x >= window.innerWidth - 60){

ball.dir *= -1;

}

}
else{

ball.y += 8;

let coneCenter = coneX + 50;

if(ball.y > window.innerHeight - 220){

if(
ball.x + 30 > coneCenter - 45 &&
ball.x + 30 < coneCenter + 45
){

score++;

document.getElementById("score")
.innerText = score;

addIceCream();

resetBall(ball);

}

}

if(ball.y > window.innerHeight){

resetBall(ball);

}

}

ball.el.style.left = ball.x + "px";
ball.el.style.top = ball.y + "px";

}

function resetBall(ball){

ball.falling = false;

ball.y = Math.random()*150 + 50;

ball.x = Math.random()*(window.innerWidth-60);

}

function addIceCream(){

let scoop =
document.createElement("div");

scoop.className = "scoop";

scoop.style.background =
colors[Math.floor(Math.random()*colors.length)];

let offset =
Math.random()*20 - 10;

let angle =
Math.random()*16 - 8;

scoop.style.left =
(coneX + 20 + offset) + "px";

scoop.style.bottom =
(120 + towerHeight*35) + "px";

scoop.style.transform =
"rotate(" + angle + "deg)";

document
.getElementById("game")
.appendChild(scoop);

towerHeight++;

document.getElementById("height")
.innerText = towerHeight;

}

function gameLoop(){

if(gameOver) return;

for(let i=0;i<balls.length;i++){

updateBall(balls[i]);

}

cone.style.left = coneX + "px";

requestAnimationFrame(gameLoop);

}

function dropBall(){

if(gameOver) return;

for(let i=0;i<balls.length;i++){

if(!balls[i].falling){

balls[i].falling = true;

break;

}

}

}

document.addEventListener("click",dropBall);

document.addEventListener("keydown",function(e){

if(e.code==="Space"){

dropBall();

}

if(e.key==="a" ||
e.key==="ArrowLeft"){

coneX -= 25;

}

if(e.key==="d" ||
e.key==="ArrowRight"){

coneX += 25;

}

if(coneX < 0){

coneX = 0;

}

if(coneX > window.innerWidth-100){

coneX = window.innerWidth-100;

}

});

const timer = setInterval(function(){

timeLeft--;

document.getElementById("time")
.innerText = timeLeft;

if(timeLeft <= 0){

clearInterval(timer);

gameOver = true;

document.getElementById("finalScore")
.innerText = score;

document.getElementById("finalHeight")
.innerText = towerHeight;

document.getElementById("endScreen")
.style.display = "block";

}

},1000);

gameLoop();

</script>

</body>
</html>
